<ngx-spinner type="ball-scale-multiple"></ngx-spinner>
<p-toast />
<app-sidebar></app-sidebar>
<div class="content">
  <h2>Productos</h2>
  <p>
    <p-button severity="info" (click)=" addProduct()">
      <i class="pi pi-save"></i> Agregar
    </p-button>
  </p>
  <p-table #dt2 [value]="productsDTO.products" [lazy]="true" (onLazyLoad)="getProducts($event)" [paginator]="true"
    [rows]="5" [totalRecords]="productsDTO.total" [loading]="productsDTO.loading" showGridlines stripedRows>
    <ng-template pTemplate="header">
      <tr>
        <th>
          <p-columnFilter type="text" field="name" placeholder="Buscar por nombre" display="row"
            [showMenu]="false" class="w-full"></p-columnFilter>
        </th>
        <th></th>
        <th></th>
        <th></th>
        <th>
          <p-columnFilter field="categoryId" matchMode="equals" [showMenu]="false">
            <ng-template pTemplate="filter" let-value let-filter="filterCallback">
              <p-select [ngModel]="value" [options]="categories" (onChange)="filter($event.value)"
                placeholder="Buscar por categoría" [showClear]="true" optionLabel="name" optionValue="id" class="w-full"  appendTo="body">

              </p-select>
            </ng-template>
          </p-columnFilter>
        </th>
        <th></th>
        <th></th>
        <th></th>
      </tr>

      <tr>
        <th style="width:22%">Nombre</th>
        <th>Descripción</th>
        <th>Imagen</th>
        <th>Precio</th>
        <th style="width:15%">Categoria</th>
        <th>Stock</th>
        <th></th>
        <th></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product>
      <tr>
        <td>{{ product.name }}</td>
        <td>{{ product.description }}</td>
        <td>
          <img [src]="'data:image/png;base64,' + product.image" [alt]="product.name" class="w-24 rounded" width="80"
            height="80" />
        </td>
        <td>{{ product.price | currency: 'USD' }}</td>
        <td>{{ product.category?.name }}</td>
        <td>{{ product.stock }}</td>
        <td>
          <p-button severity="warn" (click)="updateProduct(product)">
            <i class="pi pi-pen-to-square"></i>
          </p-button>
        </td>
        <td>
          <p-button severity="danger" (click)="deleteProduct(product.productId)">
            <i class="pi pi-trash"></i>
          </p-button>
        </td>
      </tr>



    </ng-template>
    <ng-template #footer>
      @if(productsDTO.products.length == 0){
      <tr>
        <td colspan="8" class="text-center">Sin Resultados</td>
      </tr>
      }
    </ng-template>
  </p-table>

</div>
